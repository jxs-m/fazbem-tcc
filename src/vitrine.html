<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossos Produtos — Faz Bem</title>
  <style>
    :root{ 
      --green-primary: #2b8a3e; 
      --green-light: #dcfce7;
      --bg:#f7f9f7; 
      font-family: 'Inter', sans-serif; 
    }
    body { margin:0; background: var(--bg); color: #1f2937; padding-bottom: 40px; }
    
    
    header {
      background: white; border-bottom: 1px solid #e5e7eb; padding: 16px 24px;
      position: fixed; top: 0; width: 100%; z-index: 100;
      display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    .brand { font-size: 20px; font-weight: 800; color: var(--green-primary); text-decoration: none; display:flex; gap:8px;}
    
    .auth-buttons { display: flex; gap: 10px; }
    .btn-login { text-decoration: none; color: var(--green-primary); font-weight: 600; padding: 8px 16px; border: 1px solid var(--green-primary); border-radius: 20px; }
    .btn-register { text-decoration: none; background: var(--green-primary); color: white; font-weight: 600; padding: 8px 16px; border-radius: 20px; }
    
    main { max-width: 1000px; margin: 90px auto 0 auto; padding: 24px; }
    
   
    h2 { font-size: 24px; color: var(--green-primary); border-bottom: 2px solid #e5e7eb; padding-bottom: 12px; margin-bottom: 16px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
    
    .card {
      background: white; border-radius: 16px; padding: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); text-align: center;
      transition: transform 0.2s; border: 2px solid transparent;
      display: flex; flex-direction: column; height: 100%;
    }
    .card:hover { transform: translateY(-4px); border-color: var(--green-light); }
    
    .prod-icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .prod-name { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
    .prod-price { color: var(--green-primary); font-weight: 700; font-size: 18px; margin-bottom: 16px; }
    
    
    .btn-action { 
      background: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db; padding: 12px; 
      border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; margin-top: auto;
      transition: 0.2s;
    }
    .btn-action:hover { background: var(--green-primary); color: white; border-color: var(--green-primary); }

    @media (max-width: 600px) {
        .product-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { padding: 12px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="brand"><span>🌿</span> Faz Bem</a>
    <div class="auth-buttons">
        <a href="login.html" class="btn-login">Entrar</a>
        <a href="cadastro.html" class="btn-register">Criar Conta</a>
    </div>
  </header>

  <main>
    <div style="background:#dcfce7; color:#14532d; padding:20px; border-radius:12px; text-align:center; margin-bottom:40px;">
        <strong>Estes são nossos produtos frescos de hoje!</strong><br>
        Faça login ou crie sua conta para montar sua cesta.
    </div>

    <div id="vitrine-container">
      <div style="text-align:center; padding:40px; color:#9ca3af;">Carregando produtos...</div>
    </div>
  </main>

  <script>
    const icones = {
      'Legumes': '🍅', 'Verduras': '🥬', 'Frutas': '🍊', 'Processados': '🥕', 'Outros': '📦'
    };

    document.addEventListener('DOMContentLoaded', carregarVitrine);

    async function carregarVitrine() {
      const container = document.getElementById('vitrine-container');
      try {
        // chama a API 
        const response = await fetch('api_vitrine.php');
        const json = await response.json();

        if (json.success) {
          container.innerHTML = '';
          const grupos = agruparPorCategoria(json.data);
          const ordem = ['Legumes', 'Verduras', 'Frutas', 'Processados', 'Outros'];

          ordem.forEach(cat => {
            if (grupos[cat] && grupos[cat].length > 0) {
              renderizarSecao(container, cat, grupos[cat]);
            }
          });
        }
      } catch (error) {
        container.innerHTML = '<p style="text-align:center">Erro ao carregar vitrine.</p>';
      }
    }

    function agruparPorCategoria(produtos) {
      return produtos.reduce((acc, produto) => {
        const cat = produto.categoria;
        if (!acc[cat]) acc[cat] = [];
        acc[cat].push(produto);
        return acc;
      }, {});
    }

    function renderizarSecao(container, categoria, produtos) {
      const section = document.createElement('section');
      const iconeCat = icones[categoria] || '📦';
      
      let htmlProdutos = '';
      
      produtos.forEach(p => {
        const precoF = parseFloat(p.preco).toFixed(2).replace('.', ',');
        
        
        const imagemDisplay = p.imagem_url 
            ? `<img src="${p.imagem_url}" style="width:100px; height:100px; object-fit:cover; border-radius:8px; margin-bottom:10px;">` 
            : `<span class="prod-icon">${iconeCat}</span>`;

        htmlProdutos += `
          <div class="card">
            ${imagemDisplay}
            <div class="prod-name">${p.nome}</div>
            <div class="prod-price">R$ ${precoF} <span style="font-size:12px; color:#999">/ ${p.unidade}</span></div>
            <button class="btn-action" onclick="irParaLogin()">
              Entre para Comprar
            </button>
          </div>
        `;
      });

      section.innerHTML = `
        <h2>${iconeCat} ${categoria}</h2>
        <div class="product-grid">${htmlProdutos}</div>
        <br>
      `;
      container.appendChild(section);
    }

    function irParaLogin() {
        window.location.href = 'login.html';
    }
  </script>
</body>
</html>
